<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Premium M3U8 Player</title>
        <script
            src="https://code.jquery.com/jquery-3.6.0.min.js"
            integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4="
            crossorigin="anonymous"
        ></script>
        <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
        <script src="mousetrap.min.js" charset="utf-8"></script>
        <script src="https://telegram.org/js/telegram-web-app.js"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

            body, html {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                background-color: #050505;
                font-family: 'Inter', sans-serif;
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .player-container {
                position: relative;
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #000;
                group: player;
            }

            #video {
                width: 100%;
                height: 100%;
                max-width: 100%;
                max-height: 100%;
                outline: none;
            }

            /* Custom Controls */
            .controls-wrapper {
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                padding: 20px;
                background: linear-gradient(transparent, rgba(0,0,0,0.8));
                transition: opacity 0.3s ease;
                opacity: 0;
                z-index: 10;
            }

            .player-container:hover .controls-wrapper,
            .player-container.show-controls .controls-wrapper {
                opacity: 1;
            }

            .progress-area {
                height: 5px;
                width: 100%;
                background: rgba(255,255,255,0.2);
                border-radius: 10px;
                cursor: pointer;
                margin-bottom: 15px;
                position: relative;
                transition: height 0.1s ease;
            }

            .progress-area:hover {
                height: 8px;
            }

            .progress-bar {
                height: 100%;
                width: 0%;
                background: #3b82f6;
                border-radius: 10px;
                position: relative;
            }

            .progress-bar::after {
                content: '';
                position: absolute;
                right: -5px;
                top: 50%;
                transform: translateY(-50%);
                width: 12px;
                height: 12px;
                background: #fff;
                border-radius: 50%;
                opacity: 0;
                transition: opacity 0.1s ease;
            }

            .progress-area:hover .progress-bar::after {
                opacity: 1;
            }

            .controls-main {
                display: flex;
                align-items: center;
                justify-content: space-between;
                color: white;
            }

            .left-controls, .right-controls {
                display: flex;
                align-items: center;
                gap: 20px;
            }

            .control-btn {
                background: none;
                border: none;
                color: white;
                font-size: 18px;
                cursor: pointer;
                transition: transform 0.1s ease, color 0.2s ease;
                display: flex;
                align-items: center;
                justify-content: center;
                width: 48px;
                height: 48px;
                font-size: 24px;
            }

            .control-btn:hover {
                color: #3b82f6;
                transform: scale(1.1);
            }

            .time-display {
                font-size: 14px;
                font-weight: 500;
                min-width: 100px;
            }

            /* Volume Slider */
            .volume-container {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .volume-slider {
                width: 0;
                height: 4px;
                -webkit-appearance: none;
                background: rgba(255,255,255,0.2);
                border-radius: 5px;
                transition: width 0.3s ease;
                overflow: hidden;
            }

            .volume-container:hover .volume-slider {
                width: 80px;
            }

            .volume-slider::-webkit-slider-thumb {
                -webkit-appearance: none;
                width: 1px;
                height: 1px;
                box-shadow: -100px 0 0 100px #3b82f6;
            }

            /* Overlays */
            .control-overlay {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.5);
                backdrop-filter: blur(10px);
                color: white;
                padding: 25px;
                border-radius: 50%;
                font-size: 40px;
                display: none;
                z-index: 100;
                pointer-events: none;
                border: 1px solid rgba(255,255,255,0.1);
                animation: overlay-pop 0.4s ease;
            }

            @keyframes overlay-pop {
                0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
                50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
                100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            }

            .big-play-btn {
                position: absolute;
                font-size: 60px;
                color: white;
                cursor: pointer;
                background: rgba(59, 130, 246, 0.8);
                width: 100px;
                height: 100px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 50%;
                z-index: 20;
                transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
            }

            .big-play-btn:hover {
                transform: scale(1.15);
                background: rgba(59, 130, 246, 1);
            }

            .loading-spinner {
                position: absolute;
                width: 60px;
                height: 60px;
                border: 4px solid rgba(255,255,255,0.1);
                border-top-color: #3b82f6;
                border-radius: 50%;
                animation: spin 1s linear infinite;
                display: none;
            }

            @keyframes spin {
                to { transform: rotate(360deg); }
            }

            /* Mobile Auto-Rotation Fix for Fullscreen */
            @media screen and (max-width: 900px) and (orientation: portrait) {
                .player-container:fullscreen {
                    transform: rotate(90deg);
                    width: 100vh;
                    height: 100vw;
                    transform-origin: center;
                }
            }
        </style>
    </head>
    <body>
        <div class="player-container" id="player-container">
            <video id="video" playsinline></video>
            
            <div class="loading-spinner" id="loader"></div>
            <div class="big-play-btn" id="big-play"><i class="fas fa-play"></i></div>

            <div id="status-overlay" class="control-overlay"></div>

            <div class="controls-wrapper" id="controls">
                <div class="progress-area" id="progress-area">
                    <div class="seek-tooltip" id="seek-tooltip">00:00</div>
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                
                <div class="controls-main">
                    <div class="left-controls">
                        <button class="control-btn" id="play-pause"><i class="fas fa-play"></i></button>
                        <button class="control-btn" id="rewind"><i class="fas fa-backward"></i></button>
                        <button class="control-btn" id="forward"><i class="fas fa-forward"></i></button>
                        
                        <div class="volume-container">
                            <button class="control-btn" id="mute-btn"><i class="fas fa-volume-up"></i></button>
                            <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="0.3">
                        </div>
                        
                        <div class="time-display">
                            <span id="current-time">0:00</span> / <span id="duration">0:00</span>
                        </div>
                    </div>

                    <div class="right-controls">
                        <div class="quality-container" id="quality-container">
                            <button class="control-btn" id="quality-btn" title="Quality"><i class="fas fa-cog"></i></button>
                            <div class="quality-menu" id="quality-menu">
                                <!-- Quality levels will be injected here -->
                            </div>
                        </div>
                        <button class="control-btn" id="speed-btn" title="Playback Speed">1x</button>
                        <button class="control-btn" id="rotate-btn" title="Rotate Video"><i class="fas fa-sync"></i></button>
                        <button class="control-btn" id="fullscreen-btn" title="Fullscreen"><i class="fas fa-expand"></i></button>
                    </div>
                </div>
            </div>
        </div>
        
        <style>
            /* Mobile Adjustments */
            @media screen and (max-width: 600px) {
                .left-controls, .right-controls {
                    gap: 10px;
                }
                .volume-container {
                    display: none; /* Hide volume slider on mobile to save space */
                }
                .control-btn {
                    font-size: 16px;
                    width: 28px;
                }
                .time-display {
                    font-size: 12px;
                    min-width: 80px;
                }
            }

            .mobile-only {
                display: none;
            }

            @media (pointer: coarse) {
                .mobile-only {
                    display: flex;
                }
            }

            #video.fill-mode {
                object-fit: cover;
            }

            .player-container.rotated {
                width: 100vh !important;
                height: 100vw !important;
                position: fixed;
                top: 50% !important;
                left: 50% !important;
                transform: translate(-50%, -50%) rotate(90deg) !important;
                z-index: 9999;
                background: #000;
            }

            .quality-menu {
                position: absolute;
                bottom: 50px;
                right: 0;
                background: rgba(15, 15, 15, 0.95);
                backdrop-filter: blur(15px);
                border: 1px solid rgba(255,255,255,0.1);
                border-radius: 8px;
                padding: 10px 0;
                display: none;
                flex-direction: column;
                min-width: 120px;
                z-index: 100;
                box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            }

            .quality-menu.show {
                display: flex;
            }

            .quality-item {
                padding: 8px 20px;
                color: white;
                font-size: 13px;
                cursor: pointer;
                transition: background 0.2s;
                text-align: left;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .quality-item:hover {
                background: rgba(59, 130, 246, 0.2);
            }

            .quality-item.active {
                color: #3b82f6;
                font-weight: bold;
            }

            .quality-item.active::after {
                content: '\f00c';
                font-family: 'Font Awesome 6 Free';
                font-weight: 900;
                font-size: 10px;
            }

            /* New Seek Tooltip */
            .seek-tooltip {
                position: absolute;
                top: -40px;
                background: rgba(0, 0, 0, 0.8);
                color: #fff;
                padding: 5px 10px;
                border-radius: 4px;
                font-size: 12px;
                display: none;
                pointer-events: none;
                transform: translateX(-50%);
                white-space: nowrap;
                z-index: 100;
                border: 1px solid rgba(255,255,255,0.2);
            }

            .progress-area:hover .seek-tooltip {
                display: block;
            }

            /* Larger Play/Pause in Center */
            .big-play-btn {
                width: 120px;
                height: 120px;
                font-size: 70px;
            }
        </style>
        <script src="player.js"></script>
    </body>
</html>
